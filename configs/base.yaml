project:
  name: visiontrans_diagnostics
  seed: 42
  device: auto

data:
  dataset: nih_chest_xray
  raw_dir: data/raw
  annotations_dir: data/annotations
  processed_dir: data/processed
  manifest_dir: data/manifests
  train_manifest: data/manifests/train.csv
  val_manifest: data/manifests/val.csv
  test_manifest: data/manifests/test.csv
  image_size: 224
  num_classes: 14
  batch_size: 32
  num_workers: 4

training:
  epochs: 30
  optimizer: adamw
  learning_rate: 0.0001
  weight_decay: 0.0001
  loss: bce_with_logits
  scheduler: cosine
  early_stopping_patience: 5

evaluation:
  metrics:
    - accuracy
    - f1
    - roc_auc
    - confusion_matrix

mlflow:
  tracking_uri: mlruns
  experiment_name: cnn_vs_vit_medical
  log_artifacts: true
