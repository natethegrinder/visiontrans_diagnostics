extends: base.yaml

run:
  name: vit_tiny_baseline
  type: architecture_comparison

model:
  family: vit
  architecture: vit_tiny
  pretrained: true
  patch_size: 16
  hidden_dim: 192
  num_heads: 3
  num_layers: 12
  dropout: 0.1

training:
  learning_rate: 0.00005
  batch_size: 16
  warmup_epochs: 5
